baseURL = "https://derek.engineer/"
languageCode = "en-us"
title = "derek.engineer"
theme = "PaperMod"
paginate = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Derek Welty"
  description = "Technical build notes by Derek Welty: electronics, home automation, local tooling, Raspberry Pi projects, and the debugging details worth keeping."
  keywords = ["home assistant", "raspberry pi", "electronics", "home lab", "python", "hugo", "embedded", "DIY", "derek welty"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  env = "production"
  images = ["/og-default.png"]

  [params.homeInfoParams]
    Title = "Hi, I'm Derek"
    Content = "Electrical engineer writing down the hardware, home automation, and software projects I build at home. Mostly implementation notes, failure modes, command lines, and the details I know I'll need again."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/dcwfz9"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  # archive hidden until more posts — re-add when ready
  # [[menu.main]]
  #   identifier = "archive"
  #   name = "Archive"
  #   url = "/archive/"
  #   weight = 15
[[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 18
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 19
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
